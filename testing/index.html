<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPK Pertanian: Fuzzy SAW & Liebig</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>SPK Kesesuaian Lahan</h1>
      <p class="subtitle">Fuzzy Mamdani</p>

      <div id="resultContainer">
        <h2>Hasil Analisis Kesesuaian Lahan</h2>
        <p class="crop-name">Tanaman Pilihan: <span id="resTanaman"></span></p>
        <div class="score-display">
          <div class="score-item">
            <span class="label">Skor Akhir:</span>
            <span class="value" id="resSkor"></span>
          </div>
          <div class="score-item">
            <span class="label">Status:</span>
            <span class="value" id="resStatus"></span>
          </div>
        </div>
        <p class="message" id="resPesan"></p>
        <hr />
        <div class="detail-stats">
          <small id="resDetail"></small>
        </div>
      </div>

      <div class="card">
        <form id="spkForm">
          <p>
            <strong
              >Masukkan Nilai Rapor Lahan (0.00 = Sangat Buruk, 1.00 = Sangat
              Ideal)</strong
            >
          </p>

          <div class="form-group">
            <label>Suhu Udara:</label>
            <div class="slider-container">
              <input
                type="range"
                id="suhu"
                min="0"
                max="1"
                step="0.01"
                value="0.80"
                oninput="updateVal('val_suhu', this.value)"
              />
              <span class="slider-value" id="val_suhu">0.80</span>
            </div>
          </div>
          <div class="form-group">
            <label>Curah Hujan:</label>
            <div class="slider-container">
              <input
                type="range"
                id="hujan"
                min="0"
                max="1"
                step="0.01"
                value="0.80"
                oninput="updateVal('val_hujan', this.value)"
              />
              <span class="slider-value" id="val_hujan">0.80</span>
            </div>
          </div>
          <div class="form-group">
            <label>pH Tanah:</label>
            <div class="slider-container">
              <input
                type="range"
                id="ph"
                min="0"
                max="1"
                step="0.01"
                value="0.80"
                oninput="updateVal('val_ph', this.value)"
              />
              <span class="slider-value" id="val_ph">0.80</span>
            </div>
          </div>
          <div class="form-group">
            <label>Ketinggian Tempat (Altitude):</label>
            <div class="slider-container">
              <input
                type="range"
                id="alt"
                min="0"
                max="1"
                step="0.01"
                value="0.80"
                oninput="updateVal('val_alt', this.value)"
              />
              <span class="slider-value" id="val_alt">0.80</span>
            </div>
          </div>

          <button type="submit">Cek Kesesuaian Lahan</button>
        </form>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
